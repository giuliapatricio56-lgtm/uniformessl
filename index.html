<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pedido de Uniforme — Centro Hípico SL</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --areia: #F5F0E8;
    --navy: #1A2744;
    --bordo: #6B1A2B;
    --ouro: #C9A96E;
    --ouro-light: #e8d5b0;
    --text: #1A2744;
    --text-muted: #7a7060;
    --border: #d8d0c0;
    --white: #fff;
    --radius: 4px;
    --radius-lg: 8px;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    background: var(--areia);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--ouro-light);
  }

  header .marca {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ouro);
    margin-bottom: 6px;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--navy);
    line-height: 1.2;
  }

  header p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--navy);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--areia);
  }

  label.field-label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text);
    background: var(--areia);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--ouro); background: #fff; }

  .field { margin-bottom: 1.25rem; }

  .btn-grid {
    display: grid;
    gap: 8px;
  }
  .btn-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .btn-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

  .opt-btn {
    padding: 10px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--areia);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.3;
  }
  .opt-btn:hover { border-color: var(--ouro); }
  .opt-btn.selected {
    background: var(--navy);
    color: var(--ouro-light);
    border-color: var(--navy);
  }

  .cor-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    text-align: left;
  }
  .cor-swatch {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.1);
  }

  .tam-group-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ouro);
    margin-bottom: 6px;
    margin-top: 10px;
  }
  .tam-group-label:first-child { margin-top: 0; }

  .qtd-control {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .qtd-btn {
    width: 34px;
    height: 34px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--areia);
    color: var(--navy);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .qtd-btn:hover { border-color: var(--ouro); background: var(--white); }
  .qtd-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 500;
    color: var(--navy);
    min-width: 28px;
    text-align: center;
  }

  .hidden { display: none !important; }

  .add-btn {
    width: 100%;
    padding: 13px;
    background: var(--navy);
    color: var(--ouro-light);
    border: none;
    border-radius: var(--radius);
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 0.5rem;
  }
  .add-btn:hover { background: var(--bordo); }

  .send-btn {
    width: 100%;
    padding: 14px;
    background: var(--bordo);
    color: #f5e6ea;
    border: none;
    border-radius: var(--radius);
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 0.5rem;
  }
  .send-btn:hover { opacity: 0.88; }
  .send-btn:disabled { opacity: 0.4; cursor: default; }

  .erro {
    padding: 10px 14px;
    background: #fdecea;
    border: 1px solid #f5c0bb;
    border-radius: var(--radius);
    font-size: 12px;
    color: #8b2020;
    margin-bottom: 1rem;
    display: none;
  }

  .sacola {
    margin-top: 0.5rem;
  }
  .sacola-titulo {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .item-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--areia);
    gap: 8px;
  }
  .item-row:last-child { border-bottom: none; }
  .item-desc { font-size: 13px; line-height: 1.5; color: var(--text); }
  .item-desc span { display: block; font-size: 11px; color: var(--text-muted); }
  .item-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--border);
    font-size: 18px;
    padding: 0 4px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .item-del:hover { color: var(--bordo); }

  .total-line {
    display: flex;
    justify-content: space-between;
    padding: 10px 0 0;
    font-size: 12px;
    font-weight: 500;
    color: var(--navy);
    border-top: 1px solid var(--ouro-light);
    margin-top: 4px;
  }

  .status-msg {
    text-align: center;
    padding: 12px;
    border-radius: var(--radius);
    font-size: 12px;
    margin-top: 10px;
    display: none;
  }
  .status-msg.ok { background: #eaf5ea; color: #1a5c1a; border: 1px solid #b5d9b5; }
  .status-msg.err { background: #fdecea; color: #8b2020; border: 1px solid #f5c0bb; }

  .tela-confirmacao {
    display: none;
    text-align: center;
    padding: 2rem 0;
  }
  .confirm-icone {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #eaf5ea;
    border: 1px solid #b5d9b5;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.25rem;
    font-size: 24px;
  }
  .confirm-titulo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .confirm-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 2rem;
  }
  .confirm-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    text-align: left;
    margin-bottom: 1.5rem;
  }
  .confirm-nome {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--areia);
  }
  .confirm-item {
    padding: 8px 0;
    border-bottom: 1px solid var(--areia);
    font-size: 13px;
  }
  .confirm-item:last-of-type { border-bottom: none; }
  .confirm-item-desc { font-weight: 400; color: var(--text); }
  .confirm-item-detalhe { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .confirm-item-preco { font-size: 11px; color: var(--ouro); margin-top: 2px; }
  .confirm-total {
    display: flex;
    justify-content: space-between;
    padding: 12px 0 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    border-top: 1px solid var(--ouro-light);
    margin-top: 4px;
  }
  .novo-pedido-btn {
    width: 100%;
    padding: 13px;
    background: transparent;
    color: var(--navy);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .novo-pedido-btn:hover { border-color: var(--navy); background: var(--white); }

  .nome-secao {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    color: var(--ouro);
    margin-bottom: 1rem;
  }
</style>
</head>

        <button class="opt-btn" data-tam="P" onclick="selectTam(this)">P</button>
        <button class="opt-btn" data-tam="M" onclick="selectTam(this)">M</button>
        <button class="opt-btn" data-tam="G" onclick="selectTam(this)">G</button>
        <button class="opt-btn" data-tam="GG" onclick="selectTam(this)">GG</button>
        <button class="opt-btn" data-tam="EG" onclick="selectTam(this)">EG</button>
      </div>
    </div>

    <!-- Passo 5: Quantidade -->
    <div class="field hidden" id="step-qtd">
      <label class="field-label">Quantidade</label>
      <div class="qtd-control">
        <button class="qtd-btn" onclick="changeQtd(-1)">−</button>
        <span class="qtd-num" id="qtd-num">1</span>
        <button class="qtd-btn" onclick="changeQtd(1)">+</button>
      </div>
    </div>

    <!-- Passo 6: Nome bordado -->
    <div class="field hidden" id="step-bordado">
      <label class="field-label">Nome bordado nas costas</label>
      <input type="text" id="bordado" placeholder="Ex: Ana Silva" style="width:100%;box-sizing:border-box;" oninput="this.value=this.value.toUpperCase()" />
      <p style="font-size:10px;color:var(--text-muted);margin-top:6px;letter-spacing:0.03em;">Deixe em branco se não quiser bordado.</p>
    </div>

    <div class="erro" id="erro-item"></div>
    <button class="add-btn" onclick="adicionarItem()">+ Adicionar à lista</button>
  </div>

  <!-- Lista de itens -->
  <div class="card hidden" id="card-lista">
    <div class="section-title">Sua lista</div>
    <div class="sacola" id="lista-itens"></div>
  </div>

  <!-- Enviar -->
  <div id="erro-envio" class="erro"></div>
  <div id="status-msg" class="status-msg"></div>
  <button class="send-btn" id="btn-enviar" onclick="enviarPedido()">Enviar pedido</button>

  </div><!-- fim form-wrapper -->

  <!-- Tela de confirmação -->
  <div class="tela-confirmacao" id="tela-confirmacao">
    <div class="confirm-icone">✦</div>
    <p class="confirm-titulo">Pedido enviado!</p>
    <p class="confirm-sub">Obrigada. Entraremos em contato em breve.</p>
    <div class="confirm-card">
      <p class="confirm-nome" id="confirm-nome"></p>
      <div id="confirm-itens"></div>
      <div class="confirm-total">
        <span id="confirm-pecas"></span>
        <span id="confirm-total-val"></span>
      </div>
    </div>
    <button class="novo-pedido-btn" onclick="novoPedido()">Fazer novo pedido</button>
  </div>

</div>

<script>
  // ── CONFIGURAÇÃO ──────────────────────────────────────────
  // Cole aqui a URL do seu Google Apps Script depois de publicar
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6yVqTOp7tScCNVhLJFatbNzxUlsWD9i5oJdY1GAmRNQmLi27tFw4HyRawIFZXDdtIRw/exec';
  // ─────────────────────────────────────────────────────────

  let tipo = null, cor = null, corte = null, tam = null, qtd = 1, bordado = '';
  let itens = [];

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }

  function clearGroup(cls) {
    document.querySelectorAll('.' + cls).forEach(b => b.classList.remove('selected'));
  }

  function renderTamanhosInfantil() {
    document.querySelectorAll('#step-tam .tam-group-label').forEach(el => el.style.display = '');
    const grids = document.querySelectorAll('#step-tam .btn-grid');
    grids[0].style.display = '';
    grids[1].style.display = 'none';
    document.querySelectorAll('#step-tam .tam-group-label')[1].style.display = 'none';
  }

  function renderTamanhosAdulto() {
    document.querySelectorAll('#step-tam .tam-group-label').forEach(el => el.style.display = '');
    const grids = document.querySelectorAll('#step-tam .btn-grid');
    grids[0].style.display = 'none';
    grids[1].style.display = '';
    document.querySelectorAll('#step-tam .tam-group-label')[0].style.display = 'none';
    grids[1].querySelectorAll('.opt-btn').forEach(b => b.style.display = '');
  }

  function renderTamanhosPuffer() {
    document.querySelectorAll('#step-tam .tam-group-label').forEach(el => el.style.display = 'none');
    document.querySelectorAll('#step-tam .btn-grid').forEach((grid, i) => {
      if (i === 0) { grid.style.display = 'none'; return; }
      grid.querySelectorAll('.opt-btn').forEach(b => {
        b.style.display = ['PP','P','M','G','GG'].includes(b.dataset.tam) ? '' : 'none';
      });
    });
  }

  function renderTamanhosNormal() {
    document.querySelectorAll('#step-tam .tam-group-label').forEach(el => el.style.display = '');
    document.querySelectorAll('#step-tam .btn-grid').forEach(grid => grid.style.display = '');
    document.querySelectorAll('#step-tam .opt-btn').forEach(b => b.style.display = '');
  }

  function selectTipo(btn) {
    clearGroup('opt-btn');
    btn.classList.add('selected');
    tipo = btn.dataset.tipo;
    cor = null; corte = null; tam = null; qtd = 1;
    document.getElementById('qtd-num').textContent = '1';
    ['step-cor','step-corte','step-tam','step-qtd','step-bordado'].forEach(hide);
    document.getElementById('bordado').value = '';
    renderTamanhosNormal();
    document.querySelectorAll('#step-cor .opt-btn, #step-corte .opt-btn, #step-tam .opt-btn').forEach(b => b.classList.remove('selected'));
    if (tipo === 'puffer') {
      cor = 'Escura';
      corte = 'Unissex';
      renderTamanhosPuffer();
      show('step-tam');
    } else {
      renderTamanhosNormal();
      show('step-cor');
    }
  }

  function selectCor(btn) {
    document.querySelectorAll('#step-cor .opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    cor = btn.dataset.cor;
    corte = null; tam = null;
    document.querySelectorAll('#step-corte .opt-btn, #step-tam .opt-btn').forEach(b => b.classList.remove('selected'));
    ['step-tam','step-qtd','step-bordado'].forEach(hide);
    document.getElementById('bordado').value = '';
    show('step-corte');
  }

  function selectCorte(btn) {
    document.querySelectorAll('#step-corte .opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    corte = btn.dataset.corte;
    tam = null;
    document.querySelectorAll('#step-tam .opt-btn').forEach(b => b.classList.remove('selected'));
    hide('step-qtd');
    hide('step-bordado');
    if (corte === 'Infantil') {
      renderTamanhosInfantil();
    } else {
      renderTamanhosAdulto();
    }
    show('step-tam');
  }

  function selectTam(btn) {
    document.querySelectorAll('#step-tam .opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    tam = btn.dataset.tam;
    show('step-qtd');
    show('step-bordado');
  }

  function changeQtd(d) {
    qtd = Math.max(1, qtd + d);
    document.getElementById('qtd-num').textContent = qtd;
  }

  function tipoLabel(t) { return t === 'tshirt' ? 'T-shirt Dry Fit' : t === 'polo' ? 'Polo Dry Fit' : 'Puffer de Inverno'; }
  function tipoPreco(t) { return t === 'tshirt' ? 58 : t === 'polo' ? 65 : null; }

  function adicionarItem() {
    const erroEl = document.getElementById('erro-item');
    const faltando = [];
    if (!tipo) faltando.push('tipo');
    if (!cor) faltando.push('cor');
    if (!corte) faltando.push('corte');
    if (!tam) faltando.push('tamanho');
    if (faltando.length) {
      erroEl.style.display = 'block';
      erroEl.textContent = 'Selecione: ' + faltando.join(', ') + '.';
      return;
    }
    erroEl.style.display = 'none';
    const nomeBordado = document.getElementById('bordado').value.trim().toUpperCase();
    itens.push({ tipo: tipoLabel(tipo), cor, corte, tam, qtd, preco: tipoPreco(tipo), bordado: nomeBordado });
    renderLista();
    resetItem();
  }

  function resetItem() {
    tipo = null; cor = null; corte = null; tam = null; qtd = 1; bordado = '';
    document.getElementById('bordado').value = '';
    document.querySelectorAll('#card-lista ~ .card .opt-btn, .card .opt-btn').forEach(b => b.classList.remove('selected'));
    ['step-cor','step-corte','step-tam','step-qtd','step-bordado'].forEach(hide);
    document.getElementById('bordado').value = '';
    renderTamanhosNormal();
    document.getElementById('qtd-num').textContent = '1';
    // reset visual de todos os opt-btn do card de adicionar
    document.querySelectorAll('#step-tipo .opt-btn, #step-cor .opt-btn, #step-corte .opt-btn, #step-tam .opt-btn').forEach(b => b.classList.remove('selected'));
  }

  function removerItem(i) {
    itens.splice(i, 1);
    renderLista();
  }

  function renderLista() {
    const cardLista = document.getElementById('card-lista');
    const listaEl = document.getElementById('lista-itens');
    if (!itens.length) { cardLista.classList.add('hidden'); return; }
    cardLista.classList.remove('hidden');
    const total = itens.reduce((s, i) => s + i.qtd, 0);
    const totalReais = itens.reduce((s, i) => s + (i.preco ? i.preco * i.qtd : 0), 0);
    const temAOrccar = itens.some(i => !i.preco);
    listaEl.innerHTML = itens.map((it, idx) => `
      <div class="item-row">
        <div class="item-desc">
          ${it.tipo} ${it.cor} — ${it.corte}
          <span>Tam. ${it.tam} &nbsp;·&nbsp; Qtd ${it.qtd} &nbsp;·&nbsp; ${it.preco ? 'R$ ' + (it.preco * it.qtd).toFixed(2).replace('.',',') : '<em style="color:var(--ouro)">a orçar</em>'}</span>
          ${it.bordado ? '<span style="color:var(--ouro);font-size:10px;letter-spacing:0.06em;">✦ BORDADO: ' + it.bordado + '</span>' : ''}
        </div>
        <button class="item-del" onclick="removerItem(${idx})" aria-label="Remover">×</button>
      </div>
    `).join('') + `<div class="total-line"><span>${total} peça${total !== 1 ? 's' : ''}</span><span>R$ ${totalReais.toFixed(2).replace('.',',')}${temAOrccar ? ' + itens a orçar' : ''}</span></div>`;
  }

  async function enviarPedido() {
    const nome = document.getElementById('nome').value.trim();
    const erroEl = document.getElementById('erro-envio');
    const statusEl = document.getElementById('status-msg');
    const btn = document.getElementById('btn-enviar');

    if (!nome) {
      erroEl.style.display = 'block';
      erroEl.textContent = 'Informe seu nome antes de enviar.';
      return;
    }
    if (!itens.length) {
      erroEl.style.display = 'block';
      erroEl.textContent = 'Adicione ao menos uma peça antes de enviar.';
      return;
    }
    erroEl.style.display = 'none';

    if (SCRIPT_URL === 'COLE_AQUI_A_URL_DO_APPS_SCRIPT') {
      statusEl.className = 'status-msg err';
      statusEl.style.display = 'block';
      statusEl.textContent = 'Configure a URL do Apps Script primeiro (veja o passo a passo).';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Enviando...';
    statusEl.style.display = 'none';

    const payload = { nome, itens: itens.map(i => ({...i, bordado: i.bordado || 'Sem bordado'})), timestamp: new Date().toLocaleString('pt-BR') };

    const itensCopia = JSON.parse(JSON.stringify(itens));
    itens = [];
    renderLista();
    document.getElementById('nome').value = '';
    mostrarConfirmacao(nome, itensCopia);

    // envia via iframe invisível (mais confiável com Apps Script)
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = SCRIPT_URL;
    form.target = 'iframe-envio';
    form.style.display = 'none';

    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'data';
    input.value = JSON.stringify(payload);
    form.appendChild(input);

    const iframe = document.createElement('iframe');
    iframe.name = 'iframe-envio';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
    document.body.appendChild(form);
    form.submit();
  }

  function mostrarConfirmacao(nome, itensPedido) {
    document.getElementById('form-wrapper').style.display = 'none';
    document.getElementById('erro-envio').style.display = 'none';
    document.getElementById('status-msg').style.display = 'none';
    document.getElementById('btn-enviar').style.display = 'none';
    const tela = document.getElementById('tela-confirmacao');
    tela.style.display = 'block';

    document.getElementById('confirm-nome').textContent = nome;

    const totalReais = itensPedido.reduce((s, i) => s + (i.preco ? i.preco * i.qtd : 0), 0);
    const temAOrccar = itensPedido.some(i => !i.preco);
    const totalPecas = itensPedido.reduce((s, i) => s + i.qtd, 0);

    document.getElementById('confirm-itens').innerHTML = itensPedido.map(it => `
      <div class="confirm-item">
        <p class="confirm-item-desc">${it.tipo} ${it.cor}${it.corte && it.corte !== 'Unissex' ? ' — ' + it.corte : ''}</p>
        <p class="confirm-item-detalhe">Tam. ${it.tam} · Qtd ${it.qtd}${it.bordado ? ' · Bordado: ' + it.bordado : ''}</p>
        <p class="confirm-item-preco">${it.preco ? 'R$ ' + (it.preco * it.qtd).toFixed(2).replace('.',',') : 'Preço a orçar'}</p>
      </div>
    `).join('');

    document.getElementById('confirm-pecas').textContent = `${totalPecas} peça${totalPecas !== 1 ? 's' : ''}`;
    document.getElementById('confirm-total-val').textContent = `R$ ${totalReais.toFixed(2).replace('.',',')}${temAOrccar ? ' + a orçar' : ''}`;
  }

  function novoPedido() {
    document.getElementById('tela-confirmacao').style.display = 'none';
    document.getElementById('form-wrapper').style.display = '';
    document.getElementById('btn-enviar').style.display = '';
    document.getElementById('btn-enviar').disabled = false;
    document.getElementById('btn-enviar').textContent = 'Enviar pedido';
    document.getElementById('status-msg').style.display = 'none';
    document.getElementById('erro-envio').style.display = 'none';
    document.getElementById('card-lista').classList.add('hidden');
    resetItem();
  }
</script>
</body>
</html>
